name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  windows:
    name: Windows x64
    runs-on: windows-latest

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\Peek.csproj

      - name: Publish zip
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:RUNNER_TEMP "peek-publish"
          dotnet publish .\Peek.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o $publishDir

          New-Item -ItemType Directory -Force -Path .\artifacts | Out-Null
          $zipPath = ".\artifacts\Peek-win-x64.zip"
          Compress-Archive -LiteralPath (Join-Path $publishDir "Peek.exe") -DestinationPath $zipPath -CompressionLevel Optimal -Force

          $hash = Get-FileHash $zipPath -Algorithm SHA256
          "$($hash.Hash.ToLowerInvariant())  Peek-win-x64.zip" | Set-Content .\artifacts\Peek-win-x64.zip.sha256 -Encoding ascii

      - name: Upload release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ env.RELEASE_TAG }}"
          gh release view $tag *> $null

          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "Peek $tag" --notes "Windows x64 build for Peek." .\artifacts\Peek-win-x64.zip .\artifacts\Peek-win-x64.zip.sha256
          } else {
            gh release upload $tag .\artifacts\Peek-win-x64.zip .\artifacts\Peek-win-x64.zip.sha256 --clobber
          }
